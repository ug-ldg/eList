services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: elist_user
      POSTGRES_PASSWORD: elist_password
      POSTGRES_DB: elist_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data: